Options:
  Language: zh_cn
  Target: ALL
  Auto-Join: true
  Force-Legacy: false
  Debug: false

Files:
  Channels: 'channels'
  Formats: 'formats.yml'
  Private-Messages: 'features.yml'
  Item-Showcase: 'features.yml'
  Megaphone: 'features.yml'
  Highlights: 'rules.yml'
  Anti-Spam: 'rules.yml'
  Filter: 'rules.yml'

Color-Chat:
  Inline:
    legacy-permission: 'ymchat.color.inline.legacy'
    format-permission: 'ymchat.color.inline.format'
    rgb-permission: 'ymchat.color.inline.rgb'
  Fixed:
    enabled: true
    rgb-colors:
      - id: pink
        display: '&#FF99CC粉色'
        permission: 'ymchat.color.rgb.pink'
        value: '#FF55FF'
      - id: sky
        display: '&#33CCFF天蓝'
        permission: 'ymchat.color.rgb.sky'
        value: '#55CCFF'

Mentions:
  Enabled: true
  Prefix: '@'
  Highlight-Color: '&#FFD54F'
  Sound: 'ENTITY_EXPERIENCE_ORB_PICKUP'
  Notify-Actionbar: true
  Allow-Everyone: true
  Everyone-Permission: 'ymchat.mention.everyone'
  Everyone-Token: 'all'

Cross-Server:
  Enabled: false
  Server-Id: 'survival-1'
  Server-Name: '生存-1'
  Poll-Interval-Ticks: 20
  Batch-Size: 100
  Retention-Hours: 24
  Show-Origin: true
  Origin-Format: '&#777777[&#33CCFF%origin_server%&#777777] '
  Database:
    Host: '127.0.0.1'
    Port: 5432
    Database: 'ymchat'
    Schema: 'public'
    Username: 'postgres'
    Password: 'change-me'
    Table: 'ymchat_cross_messages'
    SSL: false
  Logs:
    Enabled: true
    Permission: 'ymchat.logs'
    Default-Since: '24h'
    Default-Limit: 10
    Max-Limit: 30
    Timestamp-Format: 'MM-dd HH:mm:ss'
    Header-Format: '&#777777[&#FFB833日志&#777777] &#B0B0B0筛选: &#FFFFFF%filters% &#777777(&#FFFFFF%count%&#777777)'
    Line-Format: '&#777777[&#B0B0B0%time%&#777777] &#B0B0B0[%server%/%channel%] &#FFFFFF%sender%&#777777: &#FFFFFF%message%'
    Hover-Format:
      - '&#B0B0B0记录编号: &#FFFFFF%id%'
      - '&#B0B0B0时间: &#FFFFFF%time_exact%'
      - '&#B0B0B0服务器标识: &#FFFFFF%server_id%'
      - '&#B0B0B0频道: &#FFFFFF%channel%'
      - '&#B0B0B0玩家: &#FFFFFF%sender%'
      - '&#FFD700点击复制完整记录'
    Footer-Format: '%previous% &#B0B0B0第 &#FFFFFF%page%/%pages% &#B0B0B0页 %next%'
