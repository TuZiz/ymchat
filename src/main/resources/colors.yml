# 颜色配置：聊天文字和玩家名字共用同一组固定颜色值，但权限分开。
Color-Chat:
  Inline:
    legacy-permission: 'ymchat.color.inline.legacy'
    format-permission: 'ymchat.color.inline.format'
    rgb-permission: 'ymchat.color.inline.rgb'
  Fixed:
    enabled: true

Name-Color:
  Fixed:
    enabled: true

Colors:
  rgb-colors:
    - id: '0'
      display: '&#000000黑色'
      value: '&0'
      chat-permission: 'ymchat.color.0'
      name-permission: 'ymchat.namecolor.0'
    - id: '1'
      display: '&#0000AA深蓝'
      value: '&1'
      chat-permission: 'ymchat.color.1'
      name-permission: 'ymchat.namecolor.1'
    - id: '2'
      display: '&#00AA00深绿'
      value: '&2'
      chat-permission: 'ymchat.color.2'
      name-permission: 'ymchat.namecolor.2'
    - id: '3'
      display: '&#00AAAA湖蓝'
      value: '&3'
      chat-permission: 'ymchat.color.3'
      name-permission: 'ymchat.namecolor.3'
    - id: '4'
