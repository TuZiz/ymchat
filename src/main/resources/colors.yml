# 颜色配置：聊天文字和玩家名字共用同一组固定颜色值，但权限分开。
Color-Chat:
  Inline:
    legacy-permission: 'ymchat.color.inline.legacy'
    format-permission: 'ymchat.color.inline.format'
    rgb-permission: 'ymchat.color.inline.rgb'
  Fixed:
    enabled: true

Name-Color:
  Fixed:
    enabled: true

Colors:
  rgb-colors:
    # ================= 原版基础颜色 (Legacy) =================
    - id: '0'
      display: '&#000000黑色'
      value: '&0'
      chat-permission: 'ymchat.color.0'
      name-permission: 'ymchat.namecolor.0'
    - id: '1'
      display: '&#0000AA深蓝'
      value: '&1'
      chat-permission: 'ymchat.color.1'
      name-permission: 'ymchat.namecolor.1'
    - id: '2'
      display: '&#00AA00深绿'
      value: '&2'
      chat-permission: 'ymchat.color.2'
      name-permission: 'ymchat.namecolor.2'
    - id: '3'
      display: '&#00AAAA湖蓝'
      value: '&3'
      chat-permission: 'ymchat.color.3'
      name-permission: 'ymchat.namecolor.3'
    - id: '4'
      display: '&#AA0000深红'
      value: '&4'
      chat-permission: 'ymchat.color.4'
      name-permission: 'ymchat.namecolor.4'
    - id: '5'
      display: '&#AA00AA紫色'
      value: '&5'
      chat-permission: 'ymchat.color.5'
      name-permission: 'ymchat.namecolor.5'
    - id: '6'
      display: '&#FFAA00金色'
      value: '&6'
      chat-permission: 'ymchat.color.6'
      name-permission: 'ymchat.namecolor.6'
    - id: '7'
      display: '&#AAAAAA灰色'
      value: '&7'
      chat-permission: 'ymchat.color.7'
      name-permission: 'ymchat.namecolor.7'
    - id: '8'
      display: '&#555555深灰'
      value: '&8'
      chat-permission: 'ymchat.color.8'
      name-permission: 'ymchat.namecolor.8'
    - id: '9'
      display: '&#5555FF蓝色'
      value: '&9'
      chat-permission: 'ymchat.color.9'
      name-permission: 'ymchat.namecolor.9'
    - id: a
      display: '&#55FF55绿色'
      value: '&a'
      chat-permission: 'ymchat.color.a'
      name-permission: 'ymchat.namecolor.a'
    - id: b
      display: '&#55FFFF青色'
      value: '&b'
      chat-permission: 'ymchat.color.b'
      name-permission: 'ymchat.namecolor.b'
    - id: c
      display: '&#FF5555红色'
      value: '&c'
      chat-permission: 'ymchat.color.c'
      name-permission: 'ymchat.namecolor.c'
    - id: d
      display: '&#FF55FF粉色'
      value: '&d'
      chat-permission: 'ymchat.color.d'
      name-permission: 'ymchat.namecolor.d'
    - id: e
      display: '&#FFFF55黄色'
      value: '&e'
      chat-permission: 'ymchat.color.e'
      name-permission: 'ymchat.namecolor.e'
    - id: f
      display: '&#FFFFFF白色'
      value: '&f'
      chat-permission: 'ymchat.color.f'
      name-permission: 'ymchat.namecolor.f'

    # ================= 进阶美化颜色 (Custom RGB) =================
    - id: rainbow
      display: '&#FF5555彩虹渐变'
      value: '#FFFFFF'
      gradient:
        colors:
          - '#FF5555'
          - '#FFFF55'
          - '#55FF55'
          - '#55FFFF'
          - '#5555FF'
          - '#FF55FF'
      chat-permission: 'ymchat.color.rgb.rainbow'
      name-permission: 'ymchat.namecolor.rgb.rainbow'
    - id: pink
      display: '&#FF99CC基础粉'
      value: '#FF55FF'
      chat-permission: 'ymchat.color.rgb.pink'
      name-permission: 'ymchat.namecolor.rgb.pink'
    - id: sky
      display: '&#33CCFF基础蓝'
      value: '#55CCFF'
      chat-permission: 'ymchat.color.rgb.sky'
      name-permission: 'ymchat.namecolor.rgb.sky'

    # >>>>> 新增高颜值色系 <<<<<

    # 【马卡龙 / 柔和色系】
