# 展示快照预览 GUI：Inventory 和 Ender-Chest 分别定义不同容器布局。
Inventory:
  Title: '&#555555%player_name% 的背包快照'
  Shape:
    - "##aaaao##"
    - "sssssssss"
    - "sssssssss"
    - "sssssssss"
    - "hhhhhhhhh"
    - "###S#X###"

Ender-Chest:
  Title: '&#555555%player_name% 的末影箱快照'
  Shape:
    - "#########"
    - "eeeeeeeee"
    - "eeeeeeeee"
    - "eeeeeeeee"
    - "###S#X###"

# Key 定义静态按钮；实际物品槽由代码按 Shape 中的 a/s/h/e/o 填充。
Key:
  "#":
    material: BLACK_STAINED_GLASS_PANE
    name: ' '
  "S":
    action: summary
    material: BOOK
    name: '&#33CCFF快照信息'
    lore:
      - '&#B0B0B0发送者: &#FFFFFF%player_name%'
      - '&#B0B0B0来源服务器: &#FFFFFF%server_name%'
      - '&#B0B0B0快照类型: &#FFFFFF%snapshot_type%'
      - '&#B0B0B0创建时间: &#FFFFFF%created_at%'
  "X":
    action: close
    material: BARRIER
    name: '&#FF6B6B✖ 关闭预览'
    lore:
      - '&#B0B0B0关闭这个展示快照界面。'

# Types 用于把内部快照类型显示成可读文本。
Types:
  inventory: '背包'
  ender-chest: '末影箱'
  none: '无'
