Private-Messages:
  Enabled: true
  Format:
    Sender: '&#FF99CC[私聊 ➔ %target_name%] &#FFFFFF{message}'
    Receiver: '&#FF99CC[%player_name% ➔ 你] &#FFFFFF{message}'
    Spy: '&#777777[监听] &#FF99CC%player_name% ➔ %target_name%: &#FFFFFF{message}'
  Messages:
    Disabled: '&#777777[&#FF6B6B!&#777777] &#FF6B6B当前服务器已关闭私聊功能。'
    No-Reply-Target: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你当前没有可以回复的玩家。'
    Offline: '&#777777[&#FF6B6B!&#777777] &#FF6B6B玩家 %target_name% 当前不在线。'
    Self: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你不能给自己发送私聊。'
  Rules:
    - id: default
      priority: 10
      condition: '~'
      sender: '&#FF99CC[私聊 ➔ %target_name%] &#FFFFFF{message}'
      receiver: '&#FF99CC[%player_name% ➔ 你] &#FFFFFF{message}'
      spy: '&#777777[监听] &#FF99CC%player_name% ➔ %target_name%: &#FFFFFF{message}'
    - id: admin
      priority: 100
      condition: 'perm "group.admin"'
      sender: '&#FF6B6B[管理私聊 ➔ %target_name%] &#FFFFFF{message}'
      receiver: '&#FF6B6B[%player_name% ➔ 你] &#FFFFFF{message}'
      spy: '&#777777[管理监听] &#FF6B6B%player_name% ➔ %target_name%: &#FFFFFF{message}'

Item-Showcase:
  Enabled: true
  Command-Message: '展示了 [物品]'
  Messages:
    Disabled: '&#777777[&#FF6B6B!&#777777] &#FF6B6B展示功能当前已关闭。'
    Only-Player: '&#777777[&#FF6B6B!&#777777] &#FF6B6B只有玩家可以展示聊天内容。'

  Item:
    Enabled: true
    Permission: 'ymchat.item.showcase'
    Bypass-Cooldown-Permission: 'ymchat.item.showcase.bypass'
    Cooldown-Millis: 3000
    Tokens: ['[物品]', '[i]', ':i:']
    Max-Per-Message: 1
    Item-Text: '&#FFD700[{item_name} &#B0B0B0x{amount}&#FFD700]'
    Messages:
      No-Permission: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你没有权限展示物品。'
      Empty-Hand: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你主手上没有可以展示的物品。'
      Cooldown: '&#777777[&#FFD700!&#777777] &#FFD700展示物品太频繁了，请 %remaining_seconds% 秒后再试。'

  Inventory:
    Enabled: true
    Permission: 'ymchat.showcase.inventory'
    Bypass-Cooldown-Permission: 'ymchat.showcase.inventory.bypass'
    Cooldown-Millis: 5000
    Tokens: ['[背包]', '[inv]']
    Max-Per-Message: 1
    Text: '&#33CCFF[背包]'
    Hover:
      - '&#B0B0B0玩家: &#FFFFFF%player_name%'
      - '&#33CCFF点击查看背包快照'
    Messages:
      No-Permission: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你没有权限展示背包。'
      Empty: '&#777777[&#FF6B6B!&#777777] &#FF6B6B当前没有可展示的背包内容。'
      Cooldown: '&#777777[&#FFD700!&#777777] &#FFD700展示背包太频繁了，请 %remaining_seconds% 秒后再试。'

  Ender-Chest:
    Enabled: true
    Permission: 'ymchat.showcase.enderchest'
    Bypass-Cooldown-Permission: 'ymchat.showcase.enderchest.bypass'
    Cooldown-Millis: 5000
    Tokens: ['[末影箱]', '[ec]']
    Max-Per-Message: 1
    Text: '&#D9A7FF[末影箱]'
    Hover:
      - '&#B0B0B0玩家: &#FFFFFF%player_name%'
      - '&#D9A7FF点击查看末影箱快照'
    Messages:
      No-Permission: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你没有权限展示末影箱。'
      Empty: '&#777777[&#FF6B6B!&#777777] &#FF6B6B当前没有可展示的末影箱内容。'
      Cooldown: '&#777777[&#FFD700!&#777777] &#FFD700展示末影箱太频繁了，请 %remaining_seconds% 秒后再试。'

  Position:
    Enabled: true
    Permission: 'ymchat.showcase.position'
    Bypass-Cooldown-Permission: 'ymchat.showcase.position.bypass'
    Cooldown-Millis: 1000
    Tokens: ['[坐标]', '[pos]']
    Max-Per-Message: 1
    Text: '&#55E690[%world% %x% %y% %z%]'
    Hover:
      - '&#B0B0B0玩家: &#FFFFFF%player_name%'
      - '&#B0B0B0世界: &#FFFFFF%world%'
      - '&#B0B0B0坐标: &#FFFFFF%x%, %y%, %z%'
      - '&#FFD700点击复制坐标'
    Copy-Text: '%world% %x% %y% %z%'
    Messages:
      No-Permission: '&#777777[&#FF6B6B!&#777777] &#FF6B6B你没有权限展示坐标。'
      Cooldown: '&#777777[&#FFD700!&#777777] &#FFD700展示坐标太频繁了，请 %remaining_seconds% 秒后再试。'
Megaphone:
  Data-File: 'megaphones.yml'
  Use-Permission: 'ymchat.megaphone.use'
  Admin-Permission: 'ymchat.megaphone.admin'
  Default-Mode: chat
  Capture-World-Channel: true
  Modes:
    Chat:
      Enabled: true
      Cost: 1
      Permission: 'ymchat.megaphone.chat'
      Display: '聊天栏'
      Format: '&#777777[&#FFB833大喇叭&#777777] &#55E690%player_name%&#777777: &#FFFFFF%message%'
    Title:
      Enabled: true
      Cost: 3
      Permission: 'ymchat.megaphone.title'
      Display: '标题'
      Title: '&#FFB833大喇叭'
      Subtitle: '&#55E690%player_name%&#777777: &#FFFFFF%message%'
      Fade-In-Ticks: 10
      Stay-Ticks: 60
      Fade-Out-Ticks: 10
    BossBar:
      Enabled: true
      Cost: 5
      Permission: 'ymchat.megaphone.bossbar'
      Display: '顶部栏'
      Text: '&#FFB833大喇叭 &#777777| &#55E690%player_name%&#777777: &#FFFFFF%message%'
      Color: YELLOW
      Style: SOLID
      Duration-Ticks: 100
      Progress: 1.0
      Animation:
        Enabled: true
        Style: typing-flow
        Interval-Ticks: 2
        Flow-Width: 18
