# 反刷屏：冷却、长度和重复消息都在这里限制。
Anti-Spam:
  Enabled: true
  Bypass-Permission: 'ymchat.bypass.antispam'
  Cooldown-Millis: 1500
  Max-Length: 120
  Duplicate-Window-Millis: 30000
  Block-Duplicate: false

# 文本过滤：block 会拦截消息，replace 会替换匹配内容。
Filter:
  Enabled: true
  # 云词库格式参考:
  # https://raw.githubusercontent.com/Yurinann/Filter-Thesaurus-Cloud/main/database.json
  Cloud:
    Enabled: true
    Url: 'https://raw.githubusercontent.com/Yurinann/Filter-Thesaurus-Cloud/main/database.json'
    Array-Path: 'words'
    Refresh-Minutes: 60
    Mode: block
    Replacement: '***'
    Bypass-Permission: 'ymchat.filter.bypass'
    Scopes:
      - all
  # Local fallback rules still work when the cloud list has not finished loading
  # or the network cannot reach GitHub. Keep player-visible messages in lang/*.yml.
  Rules:
    - id: profanity-basic
      scope: all
      mode: block
      regex: true
      case-sensitive: false
      match: '(?iu)(?:f[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*u[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*c[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*k|s[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*h[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*i[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*t|n[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*m[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*s[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*l|c[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*n[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*m|r[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*n[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*m|s[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*b|傻[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*逼|煞[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*笔|傻[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*b|操[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*你[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*妈|草[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*你[\s\p{Punct}\p{P}\u200B\u200C\u200D\uFEFF]*妈)'
      replacement: '***'
      bypass-permission: 'ymchat.filter.bypass'
      channels:
        - '*'
